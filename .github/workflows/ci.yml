name: ci
on:
  push:
jobs:
  build-and-check:
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v2
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:unit

      # Split system deps from the browser download: the combined
      # `--with-deps` wedges on the interactive `needrestart` apt prompt.
      - name: Install Playwright system deps
        run: pnpm exec playwright install-deps chromium
        timeout-minutes: 5
        env:
          DEBIAN_FRONTEND: noninteractive
          NEEDRESTART_MODE: a

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium
        timeout-minutes: 5

      # playwright.config.ts writes the committed test public key to .dev.vars,
      # which @cloudflare/vite-plugin loads into the Worker for dashboard auth.
      - name: Test
        run: pnpm test

      - name: Deploy
        run: pnpm release
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

      - name: Create GitHub Preview Deployment
        if: github.ref_name != 'main'
        uses: chrnorm/deployment-action@v2
        with:
          token: "${{ github.token }}"
          # env.DEPLOYMENT_URL is set by ./scripts/deploy.sh
          environment-url: https://${{ env.DEPLOYMENT_URL }}
          environment: Preview
          production-environment: false
          initial-status: success

      - name: Create GitHub Production Deployment
        if: github.ref_name == 'main'
        uses: chrnorm/deployment-action@v2
        with:
          token: "${{ github.token }}"
          environment-url: https://${{ env.DEPLOYMENT_URL }}
          environment: Production
          production-environment: true
          initial-status: success
